<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favorite Yu-Gi-Oh! Monster — Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body {
    font-family: "Merriweather", Georgia, serif;
    background: #2b2b2b url("page-bg.jpg") center center / cover no-repeat fixed;
    color: #eee;
    padding: 20px 20px 30px;
    text-align: center;
  }

  h1 {
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 36px;
  }

  h1 img.logo-inline {
    height: 2.0em;
    width: auto;
    vertical-align: middle;
  }

  /* Combined "make your own list" link + credit, side by side in one row */
  #top-links {
    margin: 0 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 24px;
    font-size: 18px;
    font-weight: bold;
  }

  #top-links a {
    color: #fff;
    text-decoration: underline;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  #top-links .credit {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  #top-links .x-logo {
    height: 18px;
    width: auto;
  }

  #search-section {
    max-width: 700px;
    margin: 0 auto 20px;
  }

  #search-box {
    width: 100%;
    padding: 12px 16px;
    font-size: 16px;
    font-family: inherit;
    border-radius: 8px;
    border: none;
    box-sizing: border-box;
  }

  #search-results {
    margin-top: 12px;
    text-align: left;
  }

  .search-result {
    background: rgba(255,255,255,0.95);
    color: #222;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .search-result img {
    width: 48px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .search-result .info {
    flex: 1;
    min-width: 0;
  }

  .search-result .info .sr-name {
    font-weight: bold;
    font-size: 19px;
  }

  .search-result .sr-rank {
    font-size: 24px;
    font-weight: bold;
    color: #8a6d00;
    flex-shrink: 0;
    min-width: 44px;
    text-align: center;
  }

  .search-result .heat-box {
    flex: 0 0 240px;
  }

  .search-empty {
    color: #ccc;
    font-size: 14px;
    padding: 10px 0;
  }

  /* ---------- Tabs ---------- */
  #tabs {
    max-width: 1000px;
    margin: 0 auto 16px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  #tabs button {
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #666;
    background: #333;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  #tabs button:hover {
    background: #4a4a4a;
    border-color: #888;
  }

  #tabs button.active {
    background: #fff;
    color: #222;
    border-color: #fff;
  }

  /* ---------- Shared heat-box style (matches the original analytics page):
     percentage + vote count overlaid directly on a heatmap-colored rectangle ---------- */
  .heat-box {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 34px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 10px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.25);
  }

  /* ---------- Category panel ---------- */
  #panel {
    max-width: 900px;
    margin: 0 auto;
    background: rgba(255,255,255,0.97);
    color: #222;
    border-radius: 12px;
    padding: 24px 30px;
    min-height: 200px;
    text-align: left;
  }

  #panel h2 {
    text-align: center;
    margin: 0 0 16px;
    font-size: 24px;
    text-transform: uppercase;
  }

  /* Podium: top 3 */
  .podium {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }

  .podium-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 12px 10px;
    border-radius: 10px;
    background: #fafafa;
    border: 3px solid transparent;
    position: relative;
  }

  .podium-card .medal {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .podium-card.rank-1 { border-color: #d4af37; order: 2; transform: scale(1.05); z-index: 1; }
  .podium-card.rank-1 .medal { color: #a3860f; }
  .podium-card.rank-2 { border-color: #a8a8a8; order: 1; }
  .podium-card.rank-2 .medal { color: #777; }
  .podium-card.rank-3 { border-color: #b06a35; order: 3; }
  .podium-card.rank-3 .medal { color: #8a4e22; }

  .podium-card img {
    width: 65px;
    border-radius: 5px;
    margin-bottom: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .podium-card .pname {
    flex: 1; /* grows to fill leftover vertical space so heat-boxes below
                 line up at the same height across all 3 cards, regardless
                 of whether this card's name wrapped to 1 or 2 lines */
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: bold;
    line-height: 1.25;
    margin-bottom: 6px;
  }

  .podium-card .heat-box {
    width: 100%;
    box-sizing: border-box;
  }

  /* Remaining ranks (4+): compact list */
  .rest-list .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid #eee;
  }

  .rest-list .row:last-child { border-bottom: none; }

  .rest-list .rank {
    width: 26px;
    font-size: 15px;
    font-weight: bold;
    color: #999;
    text-align: center;
    flex-shrink: 0;
  }

  .rest-list img {
    width: 34px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .rest-list .name {
    flex: 1 1 auto;
    font-size: 15px;
    min-width: 0;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  .rest-list .heat-box {
    flex: 0 0 220px;
  }

  .empty {
    text-align: center;
    color: #888;
    font-style: italic;
    padding: 40px 0;
  }

  #status {
    color: #ccc;
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>Everyone's Favorite <img src="tcg-logo.png" class="logo-inline" alt="Yu-Gi-Oh!"> Monsters</h1>

<div id="top-links">
  <a href="index.html">Make your own list here!</a>
  <span class="credit">Made by <img src="x-logo.png" class="x-logo" alt="X"> <a href="https://x.com/_Bawsch" target="_blank" rel="noopener">@_Bawsch</a></span>
</div>

<div id="tabs"></div>

<div id="search-section">
  <input type="text" id="search-box" placeholder="Search for a card in this category...">
  <div id="search-results"></div>
</div>

<div id="panel"><p class="empty">Loading...</p></div>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="analytics.js"></script>
</body>
</html>
