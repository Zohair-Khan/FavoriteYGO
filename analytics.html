<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favorite Yu-Gi-Oh! Monster — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body {
    font-family: "Merriweather", Georgia, serif;
    background: #2b2b2b url("page-bg.jpg") center center / cover no-repeat fixed;
    color: #eee;
    padding: 30px 20px;
    text-align: center;
  }

  h1 {
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 36px;
  }

  h1 img.logo-inline {
    height: 2.0em;
    width: auto;
    vertical-align: middle;
  }

  .site-link {
    margin: 0 0 30px;
    font-size: 22px;
  }

  .site-link a {
    color: #fff;
    text-decoration: underline;
  }

  #categories {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  .category-card {
    background: rgba(255,255,255,0.95);
    color: #222;
    border-radius: 8px;
    padding: 16px;
    text-align: left;
  }

  .category-card h2 {
    margin: 0 0 12px;
    font-size: 18px;
    text-transform: uppercase;
    border-bottom: 2px solid #333;
    padding-bottom: 6px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .row img {
    width: 36px;
    height: auto;
    border-radius: 3px;
    flex: 0 0 36px;
  }

  .row .name {
    flex: 0 0 130px;
    min-width: 0;
    font-size: 13px;
    line-height: 1.25;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  .row .heat-box {
    flex: 1 1 auto;
    min-width: 0;
    height: 34px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 8px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.25);
  }

  .empty {
    color: #777;
    font-style: italic;
    font-size: 14px;
  }

  #status {
    color: #ccc;
    margin-top: 40px;
  }

  .credit-row {
    margin-top: 50px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .credit-row a {
    color: #fff;
    text-decoration: underline;
  }

  .credit-row .x-logo {
    height: 22px;
    width: auto;
  }
</style>
</head>
<body>

<h1>Everyone's Favorite <img src="tcg-logo.png" class="logo-inline" alt="Yu-Gi-Oh!"> Monsters</h1>
<p class="site-link"><a href="index.html">Make your own list here!</a></p>

<div id="categories"></div>
<p id="status"></p>

<div class="credit-row">
  Made by <img src="x-logo.png" class="x-logo" alt="X"> <a href="https://x.com/_Bawsch" target="_blank" rel="noopener">@_Bawsch</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="analytics.js"></script>
</body>
</html>
