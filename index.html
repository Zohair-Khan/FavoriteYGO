<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favorite Yu-Gi-Oh! Monster Picker</title>
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
<link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png">
<link rel="icon" type="image/png" sizes="128x128" href="icons/icon128.png">
<link rel="icon" type="image/png" sizes="256x256" href="icons/icon256.png">
<link rel="apple-touch-icon" href="icons/icon128.png">
<link rel="stylesheet" href="style.css">

<!-- Open Graph / Twitter Card: controls how this looks when shared as a link -->
<meta property="og:title" content="What's Your Favorite Yu-Gi-Oh! Monster?">
<meta property="og:description" content="Pick your favorite monster in every category and see how your picks stack up. Made by @_Bawsch">
<meta property="og:image" content="https://zohair-khan.github.io/FavoriteYGO/template.png">
<meta property="og:url" content="https://zohair-khan.github.io/FavoriteYGO/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="What's Your Favorite Yu-Gi-Oh! Monster?">
<meta name="twitter:description" content="Pick your favorite monster in every category and see how your picks stack up. Made by @_Bawsch">
<meta name="twitter:image" content="https://zohair-khan.github.io/FavoriteYGO/template.png">
<meta name="twitter:site" content="@_Bawsch">
<meta name="twitter:creator" content="@_Bawsch">
</head>
<body>

<div id="grid" class="grid">
  <!-- boxes are positioned by script.js to sit exactly over the template's card-back slots -->
</div>

<div class="controls">
  <button id="downloadBtn">Download Image</button>
  <a href="spell_trap.html" class="cta-button">Favorite Spell/Traps</a>
  <a href="analytics.html" class="cta-button">See what others voted for!</a>
</div>

<div class="credit">
  Made by <img src="x-logo.png" class="x-logo" alt="X"> <a href="https://x.com/_Bawsch" target="_blank" rel="noopener">_Bawsch</a>
</div>

<!-- Modal for picking a card within a category -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <input type="text" id="searchBox" placeholder="Search cards...">
      <button id="clearBtn" title="Remove this box's current selection">Clear</button>
      <button id="closeModal">&times;</button>
    </div>
    <div id="cardList" class="card-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="card_data.js"></script>
<script src="script.js"></script>
</body>
</html>
